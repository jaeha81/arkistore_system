# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:
  # ---------- Security Schemes ----------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 토큰 인증. 로그인 시 httpOnly 쿠키로 자동 전달.
        Authorization 헤더 또는 Cookie를 통해 JWT 토큰 전달.

  # ---------- Parameters ----------
  parameters:
    PageParam:
      name: page
      in: query
      schema: {type: integer, minimum: 1, default: 1}
      description: 페이지 번호
    PageSizeParam:
      name: page_size
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
      description: 페이지 크기
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, format: uuid}
      description: 멱등성 키 (중복 요청 방지)
    ProjectIdPath:
      name: project_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    ProductIdPath:
      name: product_id
      in: path
      required: true
      schema: {type: string, format: uuid}

  # ---------- Responses ----------
  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 충돌 (중복 키 등)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ---------- Schemas ----------
  schemas:
    # ---- Envelope ----
    ApiResponse:
      type: object
      properties:
        success: {type: boolean}
        data: {type: object}
        meta:
          type: object
          properties:
            request_id: {type: string, nullable: true}
            timestamp: {type: string, format: date-time}

    PaginatedResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            meta:
              type: object
              properties:
                page: {type: integer}
                page_size: {type: integer}
                total: {type: integer}

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code: {type: string}
            message: {type: string}
            details: {type: object, nullable: true}
        meta:
          type: object
          properties:
            request_id: {type: string, nullable: true}
            timestamp: {type: string, format: date-time}

    # ---- Auth ----
    # (inline in paths)

    # ---- Ops-Projects ----
    ProjectCreate:
      type: object
      required: [project_name]
      properties:
        project_name: {type: string, maxLength: 200}
        description: {type: string, nullable: true}
        status:
          type: string
          enum: [active, paused, archived]
          default: active
        operation_mode:
          type: string
          enum: [normal, manual_support, agent_enabled, hybrid]
          default: normal

    ProjectUpdate:
      type: object
      properties:
        project_name: {type: string, maxLength: 200}
        description: {type: string, nullable: true}
        status:
          type: string
          enum: [active, paused, archived]
        operation_mode:
          type: string
          enum: [normal, manual_support, agent_enabled, hybrid]

    # ---- ErrorReports ----
    ErrorReportCreate:
      type: object
      required: [site_id, error_type, title, description]
      properties:
        site_id: {type: string, format: uuid}
        error_type: {type: string}
        title: {type: string, maxLength: 300}
        description: {type: string}
        url: {type: string, nullable: true}
        user_agent: {type: string, nullable: true}
        stack_trace: {type: string, nullable: true}
        screenshot_url: {type: string, nullable: true}

    # ---- Arki-Products ----
    ProductCreate:
      type: object
      required: [brand_name, product_code, product_name, unit_price]
      properties:
        brand_name: {type: string, maxLength: 200}
        product_code: {type: string, maxLength: 100}
        product_name: {type: string, maxLength: 300}
        category_name: {type: string, maxLength: 200, nullable: true}
        option_text: {type: string, maxLength: 500, nullable: true}
        unit_price: {type: number}
        currency: {type: string, maxLength: 3, default: USD}
        supplier_name: {type: string, maxLength: 200, nullable: true}

    ProductUpdate:
      type: object
      properties:
        brand_name: {type: string, maxLength: 200}
        product_name: {type: string, maxLength: 300}
        category_name: {type: string, maxLength: 200, nullable: true}
        option_text: {type: string, maxLength: 500, nullable: true}
        unit_price: {type: number}
        currency: {type: string, maxLength: 3}
        supplier_name: {type: string, maxLength: 200, nullable: true}
        is_active: {type: boolean}

    # ---- Arki-Customers ----
    CustomerCreate:
      type: object
      required: [customer_name]
      properties:
        customer_name: {type: string, maxLength: 200}
        contact_name: {type: string, maxLength: 100, nullable: true}
        phone: {type: string, maxLength: 50, nullable: true}
        email: {type: string, format: email, nullable: true}
        address: {type: string, nullable: true}
        grade:
          type: string
          enum: [normal, repeat, vip]
          default: normal

    CustomerUpdate:
      type: object
      properties:
        customer_name: {type: string, maxLength: 200}
        contact_name: {type: string, maxLength: 100, nullable: true}
        phone: {type: string, maxLength: 50, nullable: true}
        email: {type: string, format: email, nullable: true}
        address: {type: string, nullable: true}
        grade:
          type: string
          enum: [normal, repeat, vip]

    # ---- Arki-Leads ----
    LeadCreate:
      type: object
      required: [customer_name, channel]
      properties:
        customer_id: {type: string, format: uuid, nullable: true}
        customer_name: {type: string, maxLength: 200}
        channel: {type: string, maxLength: 100}
        phone: {type: string, maxLength: 50, nullable: true}
        email: {type: string, format: email, nullable: true}
        inquiry_content: {type: string, nullable: true}

    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, in_progress, converted, closed, dropped]
        assigned_to: {type: string, format: uuid, nullable: true}
        notes: {type: string, nullable: true}

    # ---- Arki-Consultations ----
    ConsultationCreate:
      type: object
      required: [customer_id, consultation_date, summary]
      properties:
        customer_id: {type: string, format: uuid}
        lead_id: {type: string, format: uuid, nullable: true}
        consultation_date: {type: string, format: date-time}
        summary: {type: string}
        notes: {type: string, nullable: true}
        next_action: {type: string, nullable: true}

    # ---- Arki-Contracts ----
    ContractCreate:
      type: object
      required: [customer_id, contract_date, total_amount]
      properties:
        customer_id: {type: string, format: uuid}
        contract_number: {type: string, maxLength: 100, nullable: true}
        contract_date: {type: string, format: date}
        total_amount: {type: number}
        currency: {type: string, maxLength: 3, default: KRW}
        notes: {type: string, nullable: true}

    ContractUpdate:
      type: object
      properties:
        contract_status:
          type: string
          enum: [draft, signed, confirmed, cancelled]
        total_amount: {type: number}
        notes: {type: string, nullable: true}

    # ---- Arki-PurchaseRequests ----
    PurchaseRequestCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: {type: string, format: uuid}
        quantity: {type: number}
        requested_delivery_date: {type: string, format: date, nullable: true}
        notes: {type: string, nullable: true}

    # ---- Arki-PurchaseOrders ----
    PurchaseOrderCreate:
      type: object
      required: [supplier_name, order_date]
      properties:
        purchase_request_id: {type: string, format: uuid, nullable: true}
        supplier_name: {type: string, maxLength: 200}
        order_date: {type: string, format: date}
        total_amount: {type: number}
        currency: {type: string, maxLength: 3, default: USD}
        notes: {type: string, nullable: true}

    PurchaseOrderUpdate:
      type: object
      properties:
        order_status:
          type: string
          enum: [created, ordered, invoiced, shipped, completed, cancelled]
        total_amount: {type: number}
        notes: {type: string, nullable: true}

    # ---- Arki-Invoices ----
    InvoiceCreate:
      type: object
      required: [purchase_order_id, invoice_number, invoice_date, total_amount]
      properties:
        purchase_order_id: {type: string, format: uuid}
        invoice_number: {type: string, maxLength: 100}
        invoice_date: {type: string, format: date}
        total_amount: {type: number}
        currency: {type: string, maxLength: 3, default: USD}

    # ---- Arki-Shipments ----
    ShipmentCreate:
      type: object
      required: [purchase_order_id, bl_number]
      properties:
        purchase_order_id: {type: string, format: uuid}
        bl_number: {type: string, maxLength: 100}
        shipping_company: {type: string, maxLength: 200, nullable: true}
        departure_date: {type: string, format: date, nullable: true}
        estimated_arrival_date: {type: string, format: date, nullable: true}

    ShipmentUpdate:
      type: object
      properties:
        shipping_company: {type: string, maxLength: 200, nullable: true}
        departure_date: {type: string, format: date, nullable: true}
        estimated_arrival_date: {type: string, format: date, nullable: true}
        actual_arrival_date: {type: string, format: date, nullable: true}
        customs_status: {type: string, maxLength: 50}
        shipment_status: {type: string, maxLength: 50}

    # ---- Arki-Deliveries ----
    DeliveryCreate:
      type: object
      required: [contract_id, customer_id, delivery_date, time_slot, delivery_team, address_text]
      properties:
        contract_id: {type: string, format: uuid}
        customer_id: {type: string, format: uuid}
        delivery_date: {type: string, format: date}
        time_slot: {type: string, maxLength: 50}
        delivery_team: {type: string, maxLength: 100}
        vehicle_code: {type: string, maxLength: 50, nullable: true}
        address_text: {type: string}
        ladder_required: {type: boolean, default: false}

    DeliveryUpdate:
      type: object
      properties:
        delivery_date: {type: string, format: date}
