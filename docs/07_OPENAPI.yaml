openapi: "3.1.0"
info:
  title: Arkistore Operations API
  version: "1.0.0"
  description: |
    Arkistore 운영 자동화 시스템 API.
    JH 운영관리(Ops) + Arkistore 업무 도메인(Arki) 통합 백엔드.
    인증은 JWT httpOnly cookie 기반.

servers:
  - url: http://localhost:8000
    description: 로컬 개발 서버

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: 인증/인가 (로그인, 로그아웃, 토큰)
  - name: Ops-Projects
    description: JH 프로젝트 관리
  - name: Ops-Issues
    description: 오류/이슈 관리
  - name: Ops-Logs
    description: 이벤트 로그 관리
  - name: Arki-Dashboard
    description: Arkistore 메인 대시보드
  - name: Arki-Products
    description: 상품 마스터 관리
  - name: Arki-Inventory
    description: 재고 관리
  - name: Arki-Customers
    description: 고객 관리
  - name: Arki-Leads
    description: 문의/리드 관리
  - name: Arki-Consultations
    description: 상담 기록 관리
  - name: Arki-Contracts
    description: 계약 관리
  - name: Arki-PurchaseRequests
    description: 발주 요청 관리
  - name: Arki-PurchaseOrders
    description: 발주서 관리
  - name: Arki-Invoices
    description: 인보이스 관리
  - name: Arki-Shipments
    description: BL/선적 관리
  - name: Arki-Deliveries
    description: 배송 예약 관리
  - name: Arki-CapacitySlots
    description: 배송 CAPA 관리
  - name: Arki-HappyCalls
    description: 해피콜 관리
  - name: ErrorReports
    description: 오류 신고
  - name: Files
    description: 파일 업로드/첨부
  - name: Sync
    description: 시트 동기화

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:
  # ============ Auth ============
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 8}
      responses:
        "200":
          description: 로그인 성공 (Set-Cookie로 JWT 전달)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: 로그아웃
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: 현재 사용자 조회
      responses:
        "200":
          description: 현재 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: 토큰 갱신
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============ Ops-Projects ============
  /api/v1/ops/projects:
    get:
      operationId: listProjects
      tags: [Ops-Projects]
      summary: 프로젝트 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, archived]
      responses:
        "200":
          description: 프로젝트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createProject
      tags: [Ops-Projects]
      summary: 프로젝트 생성
      x-idempotency-key: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: 프로젝트 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/ops/projects/{project_id}:
    get:
      operationId: getProject
      tags: [Ops-Projects]
      summary: 프로젝트 상세 조회
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          description: 프로젝트 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProject
      tags: [Ops-Projects]
      summary: 프로젝트 수정
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: 프로젝트 수정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ops/projects/{project_id}/sites:
    get:
      operationId: listProjectSites
      tags: [Ops-Projects]
      summary: 프로젝트 사이트 목록 조회
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          description: 사이트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createProjectSite
      tags: [Ops-Projects]
      summary: 프로젝트 사이트 등록
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [site_type, site_name, base_url]
              properties:
                site_type:
                  type: string
                  enum: [main_dashboard, logistics, sales, store_manager]
                site_name: {type: string}
                base_url: {type: string, format: uri}
      responses:
        "201":
          description: 사이트 등록 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============ Ops-Issues ============
  /api/v1/ops/issues:
    get:
      operationId: listIssueGroups
      tags: [Ops-Issues]
      summary: 이슈 그룹 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [new, grouped, triaged, github_created, resolved, ignored]
      responses:
        "200":
          description: 이슈 그룹 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/ops/issues/{issue_group_id}:
    get:
      operationId: getIssueGroup
      tags: [Ops-Issues]
      summary: 이슈 그룹 상세 조회
      parameters:
        - name: issue_group_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: 이슈 그룹 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateIssueGroup
      tags: [Ops-Issues]
      summary: 이슈 그룹 상태 변경
      parameters:
        - name: issue_group_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [new, grouped, triaged, github_created, resolved, ignored]
                priority: {type: string}
                assignee_id: {type: string, format: uuid, nullable: true}
      responses:
        "200":
          description: 이슈 그룹 수정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ops/issues/{issue_group_id}/github:
    post:
      operationId: createGithubIssue
      tags: [Ops-Issues]
      summary: GitHub 이슈 생성
      x-idempotency-key: true
      parameters:
        - name: issue_group_id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repository]
              properties:
                repository: {type: string}
                labels:
                  type: array
                  items: {type: string}
      responses:
        "201":
          description: GitHub 이슈 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ============ Ops-Logs ============
  /api/v1/ops/logs:
    get:
      operationId: listEventLogs
      tags: [Ops-Logs]
      summary: 이벤트 로그 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: level
          in: query
          schema: {type: string}
        - name: source
          in: query
          schema: {type: string}
        - name: from_date
          in: query
          schema: {type: string, format: date-time}
        - name: to_date
          in: query
          schema: {type: string, format: date-time}
      responses:
        "200":
          description: 이벤트 로그 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/ops/logs/{log_id}:
    get:
      operationId: getEventLog
      tags: [Ops-Logs]
      summary: 이벤트 로그 상세 조회
      parameters:
        - name: log_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: 이벤트 로그 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============ ErrorReports ============
  /api/v1/ops/error-reports:
    get:
      operationId: listErrorReports
      tags: [ErrorReports]
      summary: 오류 신고 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: site_id
          in: query
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: 오류 신고 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createErrorReport
      tags: [ErrorReports]
      summary: 오류 신고 등록
      x-idempotency-key: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorReportCreate"
      responses:
        "201":
          description: 오류 신고 등록 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/ops/error-reports/{report_id}:
    get:
      operationId: getErrorReport
      tags: [ErrorReports]
      summary: 오류 신고 상세 조회
      parameters:
        - name: report_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: 오류 신고 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============ Arki-Dashboard ============
  /api/v1/arki/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [Arki-Dashboard]
      summary: 대시보드 요약 데이터 조회
      responses:
        "200":
          description: 대시보드 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/arki/dashboard/kpi:
    get:
      operationId: getDashboardKPI
      tags: [Arki-Dashboard]
      summary: 대시보드 KPI 지표 조회
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
      responses:
        "200":
          description: KPI 지표
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============ Arki-Products ============
  /api/v1/arki/products:
    get:
      operationId: listProducts
      tags: [Arki-Products]
      summary: 상품 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: brand_name
          in: query
          schema: {type: string}
        - name: category_name
          in: query
          schema: {type: string}
        - name: is_active
          in: query
          schema: {type: boolean}
        - name: search
          in: query
          schema: {type: string}
          description: 상품명/코드 검색
      responses:
        "200":
          description: 상품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProduct
      tags: [Arki-Products]
      summary: 상품 등록
      x-idempotency-key: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: 상품 등록 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/arki/products/{product_id}:
    get:
      operationId: getProduct
      tags: [Arki-Products]
      summary: 상품 상세 조회
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      responses:
        "200":
          description: 상품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProduct
      tags: [Arki-Products]
      summary: 상품 수정
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: 상품 수정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============ Arki-Inventory ============
  /api/v1/arki/inventory:
    get:
      operationId: listInventory
      tags: [Arki-Inventory]
      summary: 재고 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [normal, low_stock, out_of_stock, inbound_pending]
        - name: warehouse_name
          in: query
          schema: {type: string}
      responses:
        "200":
          description: 재고 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/arki/inventory/{inventory_id}:
    get:
      operationId: getInventory
      tags: [Arki-Inventory]
      summary: 재고 상세 조회
      parameters:
        - name: inventory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: 재고 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateInventory
      tags: [Arki-Inventory]
      summary: 재고 수정
      parameters:
        - name: inventory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_stock: {type: number}
                reserved_stock: {type: number}
                safety_stock: {type: number}
                expected_inbound_date: {type: string, format: date, nullable: true}
      responses:
        "200":
          description: 재고 수정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============ Arki-Customers ============
  /api/v1/arki/customers:
    get:
      operationId: listCustomers
      tags: [Arki-Customers]
      summary: 고객 목록 조회
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: grade
          in: query
          schema:
            type: string
            enum: [normal, repeat, vip]
        - name: search
          in: query
          schema: {type: string}
          description: 고객명/연락처 검색
      responses:
        "200":
          description: 고객 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCustomer
      tags: [Arki-Customers]
      summary: 고객 등록
      x-idempotency-key: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: 고객 등록 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/arki/customers/{customer_id}:
    get:
      operationId: getCustomer
      tags: [Arki-Customers]
      summary: 고객 상세 조회
      parameters:
        - name: customer_id
